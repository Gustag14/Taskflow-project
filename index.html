<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header__brand">
      <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <h1>TaskFlow</h1>
    </div>
    <button id="btn-dark" class="btn btn--outline" aria-label="Activar modo oscuro">
      <span id="dark-label">☾ Oscuro</span>
    </button>
  </header>

  <main class="layout">

    <section class="content" aria-label="Gestión de tareas">

      <!-- Estadísticas -->
      <div class="stats" role="region" aria-label="Estadísticas">
        <div class="stat-card">
          <span class="stat-card__value" id="stat-total">0</span>
          <span class="stat-card__label">Total</span>
        </div>
        <div class="stat-card stat-card--accent">
          <span class="stat-card__value" id="stat-pending">0</span>
          <span class="stat-card__label">Pendientes</span>
        </div>
        <div class="stat-card stat-card--success">
          <span class="stat-card__value" id="stat-done">0</span>
          <span class="stat-card__label">Completadas</span>
        </div>
      </div>

      <!-- Barra de progreso -->
      <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progreso de tareas" id="progress-wrap">
        <div class="progress__bar">
          <div class="progress__fill" id="progress-fill"></div>
        </div>
        <span class="progress__label" id="progress-label">0% completado</span>
      </div>

      <!-- Formulario de nueva tarea -->
      <div class="card form-card">
        <div class="form-row">
          <label for="task-input" class="sr-only">Título de la nueva tarea</label>
          <input
            type="text"
            id="task-input"
            class="input"
            placeholder="Nueva tarea..."
            autocomplete="off"
            maxlength="200"
          />
          <button id="btn-add" class="btn btn--primary">Añadir</button>
        </div>
        <p class="error-msg" id="error-msg" role="alert" aria-live="polite"></p>
      </div>

      <!-- Búsqueda y filtros -->
      <div class="toolbar">
        <label for="search-input" class="sr-only">Buscar tareas</label>
        <input
          type="search"
          id="search-input"
          class="input input--search"
          placeholder="Buscar tarea..."
        />
        <div class="toolbar__row">
          <div class="filters" role="group" aria-label="Filtrar tareas">
            <button class="filter-btn filter-btn--active" data-filter="todas">Todas</button>
            <button class="filter-btn" data-filter="pendientes">Pendientes</button>
            <button class="filter-btn" data-filter="completadas">Completadas</button>
          </div>
          <div class="bulk-actions">
            <button id="btn-all" class="btn btn--sm btn--outline">Completar todo</button>
            <button id="btn-clear" class="btn btn--sm btn--danger">Limpiar hechas</button>
          </div>
        </div>
      </div>

      <!-- Lista de tareas -->
      <ul class="task-list" id="task-list" aria-label="Lista de tareas" aria-live="polite"></ul>

      <!-- Estado vacío -->
      <p class="empty-state" id="empty-state">Añade tu primera tarea arriba.</p>

      <!-- Pie de lista -->
      <p class="list-footer" id="list-footer"></p>

    </section>

  </main>

  <footer class="footer">
    <p>TaskFlow &mdash; Proyecto bootcamp</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
